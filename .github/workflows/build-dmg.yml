name: Build DMG

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on:
      - self-hosted
      - macOS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Set DMG metadata
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            echo "DMG_PATH=dist/Radio-${GITHUB_REF_NAME}.dmg" >> "${GITHUB_ENV}"
            echo "DMG_ARTIFACT=Radio-${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"
            echo "DMG_VERSION=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"
          else
            echo "DMG_PATH=dist/Radio.dmg" >> "${GITHUB_ENV}"
            echo "DMG_ARTIFACT=Radio-dmg" >> "${GITHUB_ENV}"
            echo "DMG_VERSION=" >> "${GITHUB_ENV}"
          fi

      - name: Build DMG
        run: |
          if [[ -n "${DMG_VERSION}" ]]; then
            bash ./scripts/make_dmg.sh --skip-window-customization --version "${DMG_VERSION}"
          else
            bash ./scripts/make_dmg.sh --skip-window-customization
          fi

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DMG_ARTIFACT }}
          path: ${{ env.DMG_PATH }}
          if-no-files-found: error

      - name: Attach DMG to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}
